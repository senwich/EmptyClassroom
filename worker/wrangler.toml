name = "empty-classroom-api"
main = "src/index.ts"
compatibility_date = "2024-06-01"

# Create a KV namespace and replace the id before deploying:
# npx wrangler kv:namespace create EC_CACHE
kv_namespaces = [
  { binding = "EC_CACHE", id = "replace-with-kv-namespace-id" }
]

[triggers]
crons = ["*/5 * * * *"]

# Required secrets:
# npx wrangler secret put JW_USERNAME
# npx wrangler secret put JW_PASSWORD
# Optional secrets/vars:
# npx wrangler secret put LARK_WEBHOOK
# npx wrangler secret put EC_CONFIG_JSON
# npx wrangler secret put EC_CAMPUS_TABLES_JSON
# npx wrangler secret put EC_NOTIFICATION_JSON
